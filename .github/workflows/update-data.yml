name: Update Pokemon Analyze Data

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 6:15 AM Eastern during daylight saving time.
    - cron: "15 10 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Pull online events
        run: >
          python limitless_pull.py
          --format STANDARD
          --min-players 100
          --days 31
          --pages 5
          --has-decklists
          --delay 0.5
          --pairings-delay 1.5

      - name: Pull major events
        run: >
          python limitless_major_pull.py
          --format standard
          --min-players 64
          --days 31

      - name: Build dashboard CSVs
        run: |
          python combine_players.py
          python combine_matches.py
          python extract_cards.py
          python analyze_players.py

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/*.csv
          git diff --cached --quiet && echo "No CSV changes to commit." || git commit -m "Update dashboard data"
          git push
